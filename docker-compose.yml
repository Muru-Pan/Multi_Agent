version: "3.9"

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    env_file:
      - .env
    volumes:
      - .:/workspace
    working_dir: /workspace
    ports:
      - "8000:8000"
    depends_on:
      - redis
